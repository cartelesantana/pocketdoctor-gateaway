		<h1>Register Here</h1>
		<div class="main-agileinfo">

				<form action="#" method="post">
                    <div class="col-lg-6 order-2 order-lg-1 d-flex flex-column justify-content-center text-center text-lg-start">
                        <div class="row gy-5" data-aos="fade-in">
                            <input class="text" type="text" name="FirstName" placeholder="your first name" required="">
                            <input class="text" type="text" name="SecName" placeholder="your second name" required="">
                            <input class="text " type="email" name="email" placeholder="Email Adress" required="">
                            <input class="text " type="text" name="phone" placeholder="phone number" required="">
                        </div>
                        
                    </div>
                    <div class="col-lg-6 order-2 order-lg-1 d-flex flex-column justify-content-center text-center text-lg-start">
                        <div class="row gy-5" data-aos="fade-in">
                            <label for="Role"> choose a role</label><select name="Role" id="Role">
                                <option value="Developper">Developper</option><option value="ProjectOwner">Project Owner</option>
                            </select>
                            <input class="text email" type="email" name="email" placeholder="Email" required="">
                            <input class="text" type="password" name="password" placeholder="Password" required="">
                            <input class="text w3lpass" type="password" name="password" placeholder="Confirm Password" required="">
                        </div>
                        
                    </div>
					
					<div class="wthree-text">
						<label class="anim">
							<input type="checkbox" class="checkbox" required="">
							<span>I Agree To The Terms & Conditions</span>
						</label>
						<div class="clear"> </div>
					</div>
					<input type="submit" value="SIGNUP">
				</form>
